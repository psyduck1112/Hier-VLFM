defaults:
  - /habitat_baselines: habitat_baselines_rl_config_base
  - /benchmark/nav/objectnav: objectnav_hm3d
  - /habitat/task/lab_sensors:
      - base_explorer
      - compass_sensor
      - gps_sensor
      - heading_sensor
      - frontier_sensor
  - /habitat/task/measurements:
    - frontier_exploration_map
    - traveled_stairs
  - /habitat_baselines/rl/policy: vlfm_policy
  - _self_

habitat:
  environment:
    iterator_options:
      max_scene_repeat_steps: 50000

  task:
    success_reward: 2.5
    slack_reward: -1e-3
    lab_sensors:
      base_explorer:
        turn_angle: 30

habitat_baselines:
  evaluate: True
  eval_ckpt_path_dir: data/dummy_policy.pth
  num_environments: 1
  load_resume_state_config: False

  torch_gpu_id: 0
  tensorboard_dir: "tb"
  video_dir: "video_dir"
  test_episode_count: 1
  checkpoint_folder: "data/new_checkpoints"
  trainer_name: "vlfm"
  num_updates: 270000
  log_interval: 10
  num_checkpoints: 100
  force_torch_single_threaded: True

  eval:
    split: "val"

  rl:
    policy:
      name: "HabitatITMPolicyV2"
      # 启用Ultralytics YOLO-World替代BLIP2
      use_ultralytics_yoloworld: true
      use_yoloworld: false  # 禁用原版YOLO-World
      
      # VLFM核心参数
      text_prompt: "Seems like there is a target_object ahead."
      pointnav_policy_path: "data/pointnav_weights.pth"
      depth_image_shape: [224, 224]
      pointnav_stop_radius: 0.9
      use_max_confidence: false
      object_map_erosion_size: 5
      
      # 探索参数
      exploration_thresh: 0.0
      obstacle_map_area_threshold: 1.5
      min_obstacle_height: 0.61
      max_obstacle_height: 0.88
      hole_area_thresh: 100000
      
      # 检测阈值
      coco_threshold: 0.8
      non_coco_threshold: 0.4
      
      # 机器人物理参数
      agent_radius: 0.18
      
      # 性能设置
      visualize: true
      compute_frontiers: true
      discrete_actions: false
      sync_explored_areas: false

    ppo:
      clip_param: 0.2
      ppo_epoch: 4
      num_mini_batch: 2
      value_loss_coef: 0.5
      entropy_coef: 0.01
      lr: 2.5e-4
      eps: 1e-5
      max_grad_norm: 0.2
      num_steps: 64
      use_gae: True
      gamma: 0.99
      tau: 0.95
      use_linear_clip_decay: False
      use_linear_lr_decay: False
      reward_window_size: 50
      use_normalized_advantage: False
      hidden_size: 512

    ddppo:
      sync_frac: 0.6
      distrib_backend: NCCL
      pretrained_weights: data/ddppo-models/gibson-2plus-resnet50.pth
      pretrained: False
      pretrained_encoder: False
      train_encoder: True
      reset_critic: False
      backbone: resnet50
      rnn_type: LSTM
      num_recurrent_layers: 2
