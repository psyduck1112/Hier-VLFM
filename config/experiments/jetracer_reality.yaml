# JetRacer Reality Configuration - Adapted for JetRacer Hardware

defaults:
  - /policy: vlfm_config_base
  - _self_

policy:
    name: "JetRacerRealityITMPolicyV2"
    pointnav_policy_path: "data/pointnav_weights.pth"
    depth_image_shape: [480, 640]  # JetRacer: height, width (RealSense D435i)
    pointnav_stop_radius: 0.5       # JetRacer: 较小停止半径
    use_max_confidence: False
    object_map_erosion_size: 3       # JetRacer: 较小腐蚀核
    exploration_thresh: 0.0
    obstacle_map_area_threshold: 1.0  # JetRacer: 较小面积阈值 (square meters)
    text_prompt: "Seems like there is a target_object ahead."
    min_obstacle_height: 0.1         # JetRacer: 地面机器人适用高度
    max_obstacle_height: 1.2         # JetRacer: 较低最大高度
    agent_radius: 0.06              # JetRacer: 车身半径约6cm，膨胀核3x3
    sync_explored_areas: True        # JetRacer: 同步探索区域

env:
  max_body_cam_depth: 3.0           # JetRacer: 主相机最大深度
  max_gripper_cam_depth: 1.5        # JetRacer: 无gripper，保持兼容性
  max_lin_dist: 0.3                 # JetRacer: 较慢线速度 (m/s)
  max_ang_dist: 0.524                # JetRacer: 30度角速度 (rad/s)
  time_step: 1.0                    # JetRacer: 较慢时间步长
  goal: "chair"                     # JetRacer: 默认目标