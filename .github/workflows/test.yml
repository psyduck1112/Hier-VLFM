name: VLFM CI
on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true


jobs:
  vlfm_main_build:
    runs-on: ubuntu-22.04
    defaults:
      run:
        shell: bash
    container:
      image: ghcr.io/bdaiinstitute/bdaii_vlfm:main
    steps:
    - uses: actions/checkout@v3
    - name: Pytest
      run: |
        pip install .[habitat]
        status=0
        pytest || status=$?
        if [ "$status" -eq 5 ]; then
          echo "No tests collected (pytest exit code 5); treating this run as success."
          exit 0
        fi
        exit "$status"
